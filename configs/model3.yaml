model_name: model3_pe_hierarchical

data_dir: /kaggle/input/datasets/prithishchaudhary/detergent/scooty
save_dir: /kaggle/working

dataset_type: Colmap
precompute_rays: true

t_near: 2.0
t_far: 6.0

L_pos: 10
L_dir: 4

N_c: 64
N_f: 128

use_hierarchical: true
hierarchical: true

# fine sample must land within ±delta of coarse expected-depth to count as concentrated
fine_conc_delta: 0.1

device: cuda
lr: 5.0e-4
N_iters: 200000
batch_size: 1024

val_every: 5000
ckpt_every: 10000

